services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ordering_test
      POSTGRES_PASSWORD: ordering_test
      POSTGRES_DB: ordering_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ordering_test -d ordering_test']
      interval: 2s
      timeout: 5s
      retries: 15
